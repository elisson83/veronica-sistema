{% extends 'base.html' %}
{% block title %}Novo Item{% endblock %}
{% block page_title %}Novo Item no Cardápio{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-header"><span class="card-title">Adicionar Item</span></div>
    <div class="card-body">
      <form method="post">
        <div class="form-group">
          <label class="form-label">Categoria *</label>
          <select name="categoria_id" class="form-control" required>
            {% for cat in categorias %}
            <option value="{{ cat.id }}" {% if cat_pre and cat_pre|int == cat.id %}selected{% endif %}>{{ cat.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Nome do Item *</label>
          <input type="text" name="nome" class="form-control" required placeholder="Ex: Pizza Margherita">
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <textarea name="descricao" class="form-control" rows="2" placeholder="Ingredientes, tamanho, etc."></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-group">
            <label class="form-label">Preço (R$) *</label>
            <input type="number" name="preco" class="form-control" step="0.01" min="0" required placeholder="29.90">
          </div>
          <div class="form-group">
            <label class="form-label">Preço Promocional (R$)</label>
            <input type="number" name="preco_promo" class="form-control" step="0.01" min="0" placeholder="Deixe vazio se não há promo">
          </div>
        </div>
        <div style="display:flex;gap:20px;margin-bottom:16px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="disponivel" checked> Disponível
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="destaque"> Destaque
          </label>
        </div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Adicionar</button>
          <a href="{{ url_for('cardapio') }}" class="btn btn-ghost">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
