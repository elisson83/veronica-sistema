<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PainelRestaurante</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0b0d17;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{width:100%;max-width:400px;background:#131720;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:36px 32px}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .logo-icon{width:44px;height:44px;background:#f97316;border-radius:12px;display:grid;place-items:center;font-size:18px;color:#fff}
    .logo-text{font-size:18px;font-weight:700}
    .logo-sub{font-size:12px;color:#64748b}
    .form-label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
    .form-group{margin-bottom:16px}
    .input-wrap{position:relative}
    .form-control{width:100%;padding:10px 12px;background:#1c2133;border:1px solid rgba(255,255,255,.07);border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit;transition:border-color .15s}
    .form-control:focus{outline:none;border-color:#f97316}
    .eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;padding:4px}
    .btn-login{width:100%;padding:11px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
    .btn-login:hover{opacity:.9}
    .link-cadastrar{display:block;text-align:center;margin-top:20px;font-size:13px;color:#64748b}
    .link-cadastrar a{color:#f97316;text-decoration:none}
    .flash-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
    .flash-success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.2);color:#4ade80;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-store"></i></div>
    <div>
      <div class="logo-text">PainelRestaurante</div>
      <div class="logo-sub">Acesso ao painel</div>
    </div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for cat, msg in messages %}
  <div class="flash-{{ cat }}">{{ msg }}</div>
  {% endfor %}{% endif %}{% endwith %}

  <form method="post">
    <div class="form-group">
      <label class="form-label">Usuário</label>
      <input type="text" name="username" class="form-control" required autofocus placeholder="seu_usuario">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" class="form-control" required placeholder="••••••">
        <button type="button" class="eye-btn" onclick="toggleSenha('password', this)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt" style="margin-right:6px"></i>Entrar</button>
  </form>
  <div class="link-cadastrar">
    Não tem conta? <a href="{{ url_for('cadastrar') }}">Cadastrar restaurante →</a>
  </div>
</div>
<script>
function toggleSenha(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
  else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
</body>
</html>
