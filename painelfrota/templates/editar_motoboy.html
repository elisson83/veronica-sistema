{% extends 'base.html' %}
{% block title %}Editar Motoboy — PainelFrota{% endblock %}
{% block page_title %}Editar Motoboy{% endblock %}

{% block content %}
<div style="max-width:540px;">
<form method="POST" class="card-dark p-4">
  <h6 class="mb-4" style="color:#8b5cf6;">Dados do Motoboy</h6>

  <div class="mb-3">
    <label class="form-label">Nome completo *</label>
    <input type="text" name="nome" class="form-control" value="{{ motoboy.nome }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Telefone / WhatsApp</label>
    <input type="tel" name="telefone" class="form-control" value="{{ motoboy.telefone or '' }}" placeholder="(11) 99999-9999">
  </div>
  <div class="row g-2 mb-3">
    <div class="col-6">
      <label class="form-label">Placa da moto</label>
      <input type="text" name="moto_placa" class="form-control" value="{{ motoboy.moto_placa or '' }}">
    </div>
    <div class="col-6">
      <label class="form-label">Modelo</label>
      <input type="text" name="moto_modelo" class="form-control" value="{{ motoboy.moto_modelo or '' }}">
    </div>
  </div>

  <h6 class="mb-3 mt-4" style="color:#8b5cf6;">Financeiro</h6>
  <div class="row g-2 mb-3">
    <div class="col-6">
      <label class="form-label">Taxa por entrega (R$)</label>
      <input type="number" name="taxa_entrega" class="form-control" value="{{ motoboy.taxa_entrega }}" step="0.50" min="1">
    </div>
    <div class="col-6">
      <label class="form-label">% que a frota retém</label>
      <input type="number" name="percentual_frota" class="form-control" value="{{ motoboy.percentual_frota }}" step="1" min="0" max="100">
    </div>
  </div>

  <div class="mb-4">
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" name="ativo" id="ativo" {% if motoboy.ativo %}checked{% endif %}>
      <label class="form-check-label text-muted" for="ativo">Motoboy ativo</label>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-accent">Salvar</button>
    <a href="{{ url_for('motoboys') }}" class="btn btn-surface">Cancelar</a>
  </div>
</form>
</div>
{% endblock %}
