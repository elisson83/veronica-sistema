<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Criar Conta — AppMotoboy</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #0f0f13; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card-login { background: #1a1a24; border: 1px solid #2e2e3e; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 400px; }
  .form-control { background: #0f0f13; border: 1px solid #2e2e3e; color: #e2e8f0; border-radius: 10px; }
  .form-control:focus { background: #0f0f13; border-color: #f59e0b; color: #e2e8f0; box-shadow: none; }
  .form-label { color: #94a3b8; font-size: .85rem; }
  .btn-login { background: #f59e0b; color: #000; font-weight: 700; width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; }
  .btn-login:hover { background: #d97706; }
  .frota-badge { background: #8b5cf622; border: 1px solid #8b5cf644; border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card-login">
  <div class="text-center mb-4">
    <div style="width:64px;height:64px;background:#f59e0b22;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;border:2px solid #f59e0b44;">
      <i class="fa-solid fa-motorcycle fa-xl" style="color:#f59e0b;"></i>
    </div>
    <h4 style="color:#f59e0b;font-weight:800;margin-bottom:4px;">AppMotoboy</h4>
    <p style="color:#64748b;font-size:.85rem;">Criar conta via QR Code</p>
  </div>

  {% if nome_frota %}
  <div class="frota-badge text-center">
    <div style="font-size:.75rem;color:#8b5cf6;font-weight:600;margin-bottom:2px;"><i class="fas fa-link me-1"></i>Vinculado à Frota</div>
    <div style="font-size:.9rem;color:#c4b5fd;font-weight:700;">{{ nome_frota }}</div>
  </div>
  {% else %}
  <div style="background:#2d241622;border:1px solid #f59e0b33;border-radius:10px;padding:10px 16px;margin-bottom:20px;text-align:center;">
    <div style="font-size:.8rem;color:#fbbf24;"><i class="fas fa-qrcode me-1"></i>Registro via QR Code da frota</div>
  </div>
  {% endif %}

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ 'danger' if cat=='danger' else 'success' }}" style="border-radius:10px;font-size:.85rem;">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Nome completo</label>
      <input type="text" name="nome" class="form-control" placeholder="Seu nome" required autofocus
             value="{{ nome_frota }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Nome de usuário</label>
      <input type="text" name="username" class="form-control" placeholder="usuario_sem_espacos" required
             pattern="[a-zA-Z0-9_]+" title="Apenas letras, números e _">
    </div>
    <div class="mb-3">
      <label class="form-label">Telefone (opcional)</label>
      <input type="tel" name="telefone" class="form-control" placeholder="(11) 99999-9999">
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <input type="password" name="senha" class="form-control" placeholder="••••••" required minlength="6">
    </div>
    <button type="submit" class="btn-login">
      <i class="fas fa-check me-2"></i>Criar Conta e Entrar
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="/login" style="color:#64748b;font-size:.82rem;">Já tenho conta — Fazer login</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
