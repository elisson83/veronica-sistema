{% extends 'base.html' %}
{% block title %}Configurações{% endblock %}
{% block page_title %}Configurações{% endblock %}

{% block content %}
<div class="row g-3" style="max-width:900px">
  <div class="col-md-6">
    <div class="card-dark p-4">
      <h6 class="mb-3"><i class="fas fa-key me-2" style="color:var(--accent)"></i>Alterar Senha</h6>
      <form method="POST">
        <input type="hidden" name="acao" value="trocar_senha">
        <div class="mb-3">
          <label class="form-label text-muted small">Senha Atual</label>
          <input type="password" name="senha_atual" class="form-control" required placeholder="••••••••">
        </div>
        <div class="mb-3">
          <label class="form-label text-muted small">Nova Senha</label>
          <input type="password" name="senha_nova" class="form-control" required placeholder="••••••••" minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label text-muted small">Confirmar Nova Senha</label>
          <input type="password" name="senha_conf" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-accent w-100">
          <i class="fas fa-save me-1"></i> Salvar Nova Senha
        </button>
      </form>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card-dark p-4" style="border-color:rgba(239,68,68,.3)">
      <h6 class="mb-3" style="color:#f87171"><i class="fas fa-user-slash me-2"></i>Excluir Perfil</h6>
      <p class="text-muted small mb-3">Ação <strong class="text-danger">permanente e irreversível</strong>.</p>
      <form method="POST" onsubmit="return confirm('EXCLUIR permanentemente este perfil?')">
        <input type="hidden" name="acao" value="excluir_perfil">
        <div class="mb-3">
          <label class="form-label text-muted small">Confirme sua senha</label>
          <input type="password" name="senha_excluir" class="form-control" required placeholder="Digite sua senha atual"
                 style="border-color:rgba(239,68,68,.3)">
        </div>
        <button type="submit" class="btn btn-danger w-100">
          <i class="fas fa-trash me-1"></i> Excluir Meu Perfil
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
