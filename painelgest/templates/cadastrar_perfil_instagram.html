```html
{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5 pt-5">
        <div class="row">
            <div class="col-md-6">
                <h1 class="text-white">Cadastrar Perfil Instagram</h1>
                <form method="POST" action="{{ url_for('cadastrar_perfil_instagram') }}">
                    <div class="mb-3">
                        <label for="nome" class="form-label text-white">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="login_instagram" class="form-label text-white">Login Instagram</label>
                        <input type="text" id="login_instagram" name="login_instagram" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha_instagram" class="form-label text-white">Senha Instagram</label>
                        <input type="password" id="senha_instagram" name="senha_instagram" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="texto_postagem" class="form-label text-white">Texto da Postagem</label>
                        <textarea id="texto_postagem" name="texto_postagem" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="data_agendamento" class="form-label text-white">Data e Hora do Agendamento</label>
                        <input type="datetime-local" id="data_agendamento" name="data_agendamento" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                </form>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-danger mt-3" role="alert">
                            {{ messages[0] }}
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
        </div>
    </div>
{% endblock %}
