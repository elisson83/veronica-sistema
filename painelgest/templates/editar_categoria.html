<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Categoria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--bg:#0b0d17;--surface:#131720;--surface2:#1c2133;--border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:#64748b;--accent:#6366f1}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
    .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;border:none;cursor:pointer;transition:all .15s}
    .btn-primary{background:var(--accent);color:#fff}.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-ghost:hover{background:#232a3e;color:var(--text)}
    .content{padding:24px;max-width:540px;margin:0 auto}
    .pg-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .pg-card-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
    .pg-card-body{padding:20px}
    .label{display:block;margin-bottom:5px;font-size:12px;font-weight:500;color:var(--muted)}
    .input,.select,.textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
    .input:focus,.select:focus,.textarea:focus{border-color:var(--accent)}.select option{background:var(--surface2)}
    .form-group{margin-bottom:18px}
    .icon-btn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;display:inline-grid;place-items:center;font-size:11px;transition:all .15s;text-decoration:none}
    .ib-delete{background:rgba(239,68,68,.1);color:#f87171}.ib-delete:hover{background:rgba(239,68,68,.2)}
  </style>
</head>
<body>
<header class="header">
  <a href="{{ url_for('restaurante_cardapio') }}" class="btn btn-ghost" style="padding:6px 12px;font-size:13px">
    <i class="fas fa-arrow-left"></i> Voltar
  </a>
  <span style="font-size:15px;font-weight:600">Editar Categoria</span>
</header>
<div class="content" style="margin-top:24px">
  <div class="pg-card">
    <div class="pg-card-header">
      <span><i class="fas fa-folder me-2" style="color:var(--accent)"></i>{{ cat.nome }}</span>
      <a href="{{ url_for('excluir_categoria', id=cat.id) }}" class="icon-btn ib-delete"
         onclick="return confirm('Excluir esta categoria e todos os seus itens?')">
        <i class="fas fa-trash"></i>
      </a>
    </div>
    <div class="pg-card-body">
      <form method="POST">
        <div class="form-group">
          <label class="label">Nome da Categoria *</label>
          <input type="text" name="nome" class="input" value="{{ cat.nome }}" required>
        </div>
        <div class="form-group">
          <label class="label">Descrição</label>
          <textarea name="descricao" class="textarea">{{ cat.descricao or '' }}</textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
          <div class="form-group">
            <label class="label">Ícone</label>
            <select name="icone" class="select">
              {% for icone in ['fa-utensils','fa-burger','fa-pizza-slice','fa-fish','fa-salad','fa-ice-cream','fa-mug-hot','fa-wine-glass','fa-bread-slice','fa-drumstick-bite','fa-leaf','fa-fire'] %}
              <option value="{{ icone }}" {% if icone == cat.icone %}selected{% endif %}>{{ icone }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="label">Ordem</label>
            <input type="number" name="ordem" class="input" value="{{ cat.ordem }}" min="0">
          </div>
          <div class="form-group">
            <label class="label">Ativa</label>
            <select name="ativo" class="select">
              <option value="ativo" {% if cat.ativo %}selected{% endif %}>Sim</option>
              <option value="" {% if not cat.ativo %}selected{% endif %}>Não</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <a href="{{ url_for('restaurante_cardapio') }}" class="btn btn-ghost">Cancelar</a>
          <button type="submit" class="btn btn-primary"><i class="fas fa-floppy-disk"></i> Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body></html>
