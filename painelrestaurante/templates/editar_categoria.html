{% extends 'base.html' %}
{% block title %}Editar Categoria{% endblock %}
{% block page_title %}Editar Categoria{% endblock %}
{% block content %}
<div style="max-width:480px">
  <div class="card">
    <div class="card-header"><span class="card-title">Editar: {{ cat.nome }}</span></div>
    <div class="card-body">
      <form method="post">
        <div class="form-group">
          <label class="form-label">Nome *</label>
          <input type="text" name="nome" class="form-control" required value="{{ cat.nome }}">
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <input type="text" name="descricao" class="form-control" value="{{ cat.descricao or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Ícone (FontAwesome)</label>
          <input type="text" name="icone" class="form-control" value="{{ cat.icone }}">
        </div>
        <div class="form-group">
          <label class="form-label">Ordem</label>
          <input type="number" name="ordem" class="form-control" value="{{ cat.ordem }}">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="ativo" {% if cat.ativo %}checked{% endif %}> Ativo
          </label>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
          <a href="{{ url_for('cardapio') }}" class="btn btn-ghost">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
