{% extends 'base.html' %}
{% block title %}Novo Cliente CRM{% endblock %}
{% block page_title %}Novo Cliente{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('crm') }}" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Voltar</a>
{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
  <div class="card-header"><span class="card-title">Cadastrar Cliente</span></div>
  <div class="card-body">
    <form method="post">
      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input type="text" name="nome_cliente" class="form-control" required placeholder="João da Silva" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Telefone / WhatsApp</label>
        <input type="tel" name="telefone" class="form-control" placeholder="(11) 99999-9999">
      </div>
      <div class="form-group">
        <label class="form-label">Notas internas</label>
        <textarea name="notas" class="form-control" rows="3" placeholder="Observações sobre o cliente..."></textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
        <a href="{{ url_for('crm') }}" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
