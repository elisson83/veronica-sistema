<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esqueci minha senha — PainelFrota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #0a0a12; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card-login { background: #13131f; border: 1px solid #252535; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; }
  h2 { color: #8b5cf6; font-weight: 800; }
  .form-control { background: #0a0a12; border: 1px solid #252535; color: #e2e8f0; border-radius: 10px; }
  .form-control:focus { background: #0a0a12; border-color: #8b5cf6; color: #e2e8f0; box-shadow: none; }
  .form-label { color: #64748b; font-size: .84rem; }
  .btn-login { background: #8b5cf6; color: #fff; font-weight: 700; width: 100%; padding: 12px; border-radius: 10px; border: none; }
</style>
</head>
<body>
<div class="card-login">
  <div class="text-center mb-4">
    <i class="fas fa-key fa-3x" style="color:#8b5cf6;"></i>
    <h2 class="mt-2 mb-0">PainelFrota</h2>
    <p style="color:#64748b;font-size:.88rem;">Informe seu e-mail para redefinir a senha</p>
  </div>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ 'info' if cat=='info' else 'danger' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">E-mail cadastrado</label>
      <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-paper-plane me-1"></i> Enviar link</button>
  </form>
  <p class="text-center mt-3" style="font-size:.85rem;color:#64748b">
    <a href="{{ url_for('login') }}" style="color:#8b5cf6">← Voltar ao login</a>
  </p>
</div>
</body>
</html>
