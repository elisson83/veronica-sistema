<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Senha — PainelFrota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #0a0a12; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card-login { background: #13131f; border: 1px solid #252535; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; }
  h2 { color: #8b5cf6; font-weight: 800; }
  .form-control { background: #0a0a12; border: 1px solid #252535; color: #e2e8f0; border-radius: 10px; }
  .form-control:focus { background: #0a0a12; border-color: #8b5cf6; color: #e2e8f0; box-shadow: none; }
  .form-label { color: #64748b; font-size: .84rem; }
  .btn-login { background: #8b5cf6; color: #fff; font-weight: 700; width: 100%; padding: 12px; border-radius: 10px; border: none; }
  .input-group .form-control { border-right: none; border-radius: 10px 0 0 10px; }
  .input-group-text { background: #0a0a12; border: 1px solid #252535; border-left: none; color: #64748b; cursor: pointer; border-radius: 0 10px 10px 0; }
</style>
</head>
<body>
<div class="card-login">
  <div class="text-center mb-4">
    <i class="fas fa-lock-open fa-3x" style="color:#8b5cf6;"></i>
    <h2 class="mt-2 mb-0">Nova Senha</h2>
    <p style="color:#64748b;font-size:.88rem;">Mínimo 6 caracteres</p>
  </div>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-danger">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Nova Senha</label>
      <div class="input-group">
        <input type="password" id="pwd1" name="senha" class="form-control" required autofocus>
        <span class="input-group-text" onclick="toggle('pwd1',this)"><i class="fas fa-eye"></i></span>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Confirmar Senha</label>
      <div class="input-group">
        <input type="password" id="pwd2" name="confirm" class="form-control" required>
        <span class="input-group-text" onclick="toggle('pwd2',this)"><i class="fas fa-eye"></i></span>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-check me-1"></i> Redefinir Senha</button>
  </form>
</div>
<script>
function toggle(id, btn) {
  const inp = document.getElementById(id);
  const ico = btn.querySelector('i');
  if (inp.type === 'password') { inp.type = 'text'; ico.classList.replace('fa-eye','fa-eye-slash'); }
  else { inp.type = 'password'; ico.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
</body>
</html>
