<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — AppMotoboy</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #0f0f13; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card-login { background: #1a1a24; border: 1px solid #2e2e3e; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 360px; }
  h2 { color: #f59e0b; font-weight: 800; }
  p.sub { color: #64748b; font-size: .9rem; }
  .form-control { background: #0f0f13; border: 1px solid #2e2e3e; color: #e2e8f0; border-radius: 10px; }
  .form-control:focus { background: #0f0f13; border-color: #f59e0b; color: #e2e8f0; box-shadow: none; }
  .form-label { color: #94a3b8; font-size: .85rem; }
  .btn-login { background: #f59e0b; color: #000; font-weight: 700; width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; }
  .btn-login:hover { background: #d97706; }
  .alert { border-radius: 10px; font-size: .85rem; }
</style>
</head>
<body>
<div class="card-login">
  <div class="text-center mb-4">
    <i class="fa-solid fa-motorcycle fa-3x" style="color:#f59e0b;"></i>
    <h2 class="mt-2 mb-0">AppMotoboy</h2>
    <p class="sub">Faça login para começar</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ 'danger' if cat=='danger' else 'success' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" name="username" class="form-control" placeholder="seu_usuario" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <div style="position:relative">
        <input type="password" id="pwd-motoboy" name="senha" class="form-control" placeholder="••••••" required style="padding-right:40px">
        <button type="button" onclick="toggleSenha('pwd-motoboy', this)"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;padding:4px">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login">Entrar <i class="fas fa-arrow-right ms-1"></i></button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSenha(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
</body>
</html>
