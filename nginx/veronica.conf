# Nginx — Ecossistema Verônica
# Servidor: 177.7.50.92
# Deploy: sudo cp veronica.conf /etc/nginx/sites-available/veronica
#         sudo ln -sf /etc/nginx/sites-available/veronica /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════════

# ── Redireciona todo HTTP para HTTPS ─────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── AppMotoboy — porta 5003 ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name motoboy.177.7.50.92.nip.io;

    ssl_certificate     /etc/letsencrypt/live/motoboy.177.7.50.92.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/motoboy.177.7.50.92.nip.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16M;

    location / {
        proxy_pass         http://127.0.0.1:5003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /home/ubuntu/veronica/appmotoboy/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

