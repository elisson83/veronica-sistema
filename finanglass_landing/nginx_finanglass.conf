# Configuração nginx para servir a landing page do FinanGlass
#
# INSTRUÇÕES DE DEPLOY NO VPS (177.7.50.92):
#
# 1. Copiar os arquivos para o VPS:
#    scp -r finanglass_landing/ root@177.7.50.92:/var/www/html/finanglass/
#
# 2. Copiar o APK gerado pelo EAS para o VPS:
#    scp FinanGlass.apk root@177.7.50.92:/var/www/html/finanglass/app.apk
#
# 3. Copiar este arquivo nginx para o servidor:
#    scp nginx_finanglass.conf root@177.7.50.92:/etc/nginx/sites-available/finanglass
#
# 4. Ativar:
#    ln -s /etc/nginx/sites-available/finanglass /etc/nginx/sites-enabled/
#    nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 177.7.50.92;

    # Landing page do FinanGlass
    location /finanglass {
        alias /var/www/html/finanglass;
        index index.html;
        try_files $uri $uri/ /finanglass/index.html;

        # Headers de segurança
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;
    }

    # APK download — tipo MIME correto
    location /finanglass/app.apk {
        alias /var/www/html/finanglass/app.apk;
        add_header Content-Disposition 'attachment; filename="FinanGlass.apk"';
        add_header Content-Type application/vnd.android.package-archive;
    }
}
