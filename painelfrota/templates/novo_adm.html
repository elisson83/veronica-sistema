{% extends 'base.html' %}
{% block title %}Novo Administrador — PainelFrota{% endblock %}
{% block page_title %}Novo Administrador{% endblock %}

{% block content %}
<div style="max-width:480px;">
<form method="POST" class="card-dark p-4">
  <div class="mb-3">
    <label class="form-label">Nome completo</label>
    <input type="text" name="nome" class="form-control" required autofocus>
  </div>
  <div class="mb-3">
    <label class="form-label">Usuário (login)</label>
    <input type="text" name="username" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Senha</label>
    <input type="password" name="senha" class="form-control" required minlength="6">
  </div>
  <div class="mb-4">
    <label class="form-label">Nível de acesso</label>
    <select name="nivel" class="form-select">
      {% for k, v in NIVEIS_ADM.items() %}
      <option value="{{ k }}" {% if k == 'visualizador' %}selected{% endif %}>{{ v }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-accent">Criar</button>
    <a href="{{ url_for('adms') }}" class="btn btn-surface">Cancelar</a>
  </div>
</form>
</div>
{% endblock %}
