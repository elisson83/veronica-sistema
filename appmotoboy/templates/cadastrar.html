<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cadastrar — AppMotoboy</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #0f0f13; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card-login { background: #1a1a24; border: 1px solid #2e2e3e; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 380px; }
  h2 { color: #f59e0b; font-weight: 800; }
  p.sub { color: #64748b; font-size: .9rem; }
  .form-control { background: #0f0f13; border: 1px solid #2e2e3e; color: #e2e8f0; border-radius: 10px; }
  .form-control:focus { background: #0f0f13; border-color: #f59e0b; color: #e2e8f0; box-shadow: none; }
  .form-label { color: #94a3b8; font-size: .85rem; }
  .btn-login { background: #f59e0b; color: #000; font-weight: 700; width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; }
  .btn-login:hover { background: #d97706; }
  .alert { border-radius: 10px; font-size: .85rem; }
  .input-group-text { background: #0f0f13; border: 1px solid #2e2e3e; color: #64748b; cursor: pointer; }
  .input-group .form-control { border-right: none; }
  .input-group .input-group-text { border-left: none; border-radius: 0 10px 10px 0; }
  .input-group .form-control { border-radius: 10px 0 0 10px; }
</style>
</head>
<body>
<div class="card-login">
  <div class="text-center mb-4">
    <i class="fa-solid fa-motorcycle fa-3x" style="color:#f59e0b;"></i>
    <h2 class="mt-2 mb-0">AppMotoboy</h2>
    <p class="sub">Crie sua conta para começar</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ 'danger' if cat=='danger' else 'success' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Nome completo</label>
      <input type="text" name="nome" class="form-control" placeholder="João da Silva" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="email" name="email" class="form-control" placeholder="joao@email.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Telefone / WhatsApp</label>
      <input type="tel" name="telefone" class="form-control" placeholder="(11) 99999-9999" id="tel-mb" oninput="previewCodMb()">
    </div>
    <div class="mb-3">
      <label class="form-label">CPF / CNPJ (opcional)</label>
      <input type="text" name="cpf_cnpj" class="form-control" placeholder="000.000.000-00" id="cpf-mb" oninput="previewCodMb()">
    </div>
    <div id="cod-preview" style="display:none;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;font-size:12px;color:#f59e0b;margin-bottom:12px">
      <i class="fas fa-hashtag"></i> Seu código será: <strong id="cod-val"></strong>
    </div>
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <input type="password" id="pwd1" name="senha" class="form-control" placeholder="Mínimo 6 caracteres" required>
        <span class="input-group-text" onclick="toggleSenha('pwd1',this)"><i class="fas fa-eye"></i></span>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Confirmar Senha</label>
      <div class="input-group">
        <input type="password" id="pwd2" name="confirm" class="form-control" placeholder="Repita a senha" required>
        <span class="input-group-text" onclick="toggleSenha('pwd2',this)"><i class="fas fa-eye"></i></span>
      </div>
    </div>
    <button type="submit" class="btn-login">Criar Conta <i class="fas fa-user-plus ms-1"></i></button>
  </form>

  <p class="text-center mt-3" style="font-size:.85rem;color:#64748b">
    Já tem conta? <a href="{{ url_for('login') }}" style="color:#f59e0b;font-weight:700">Entrar</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSenha(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
  else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}
function previewCodMb() {
  const cpf = document.getElementById('cpf-mb').value.replace(/\D/g,'');
  const tel = document.getElementById('tel-mb').value.replace(/\D/g,'');
  const base = cpf.length >= 4 ? cpf.slice(-4) : (tel.length >= 4 ? tel.slice(-4) : '');
  const prev = document.getElementById('cod-preview');
  if (base) { document.getElementById('cod-val').textContent = base; prev.style.display = 'block'; }
  else { prev.style.display = 'none'; }
}
</script>
</body>
</html>
