<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conectado! — PainelFrota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  body { background:#0a0a12; color:#e2e8f0; font-family:'Inter',sans-serif; min-height:100vh;
         display:flex; align-items:center; justify-content:center; padding:20px; }
  .card-qr { background:#1c1c2e; border:1px solid #252535; border-radius:16px; padding:36px; max-width:420px; width:100%; text-align:center; }
  .icon-circle { width:72px; height:72px; border-radius:50%; background:#064e3b; border:2px solid #10b981;
                 display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:1.8rem; color:#10b981; }
</style>
</head>
<body>
<div class="card-qr">
  <div class="icon-circle"><i class="fas fa-check"></i></div>
  <h4 class="fw-bold mb-1" style="color:#10b981;">Conectado com sucesso!</h4>
  <p class="text-muted mb-4" style="font-size:.88rem;">
    <strong style="color:#e2e8f0;">{{ restaurante.nome }}</strong> foi vinculado à frota.<br>
    A partir de agora, as entregas serão gerenciadas pelo painel.
  </p>

  <div class="p-3 mb-3" style="background:#064e3b33; border-radius:8px; border:1px solid #064e3b;">
    <i class="fas fa-truck-fast me-1" style="color:#10b981;"></i>
    <span style="font-size:.85rem; color:#6ee7b7;">PainelFrota ativo para este restaurante</span>
  </div>

  <p class="text-muted" style="font-size:.75rem;">Você pode fechar esta página.</p>
</div>
</body>
</html>
