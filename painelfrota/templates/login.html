<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PainelFrota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #0a0a12; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card-login { background: #13131f; border: 1px solid #252535; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; }
  h2 { color: #8b5cf6; font-weight: 800; }
  .form-control { background: #0a0a12; border: 1px solid #252535; color: #e2e8f0; border-radius: 10px; }
  .form-control:focus { background: #0a0a12; border-color: #8b5cf6; color: #e2e8f0; box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
  .form-label { color: #64748b; font-size: .84rem; }
  .btn-login { background: #8b5cf6; color: #fff; font-weight: 700; width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; }
  .btn-login:hover { background: #7c3aed; color: #fff; }
  .alert { border-radius: 10px; font-size: .85rem; background: #3b151533; border: none; color: #f87171; }
</style>
</head>
<body>
<div class="card-login">
  <div class="text-center mb-4">
    <i class="fas fa-truck-fast fa-3x" style="color:#8b5cf6;"></i>
    <h2 class="mt-2 mb-0">PainelFrota</h2>
    <p style="color:#64748b; font-size:.88rem;">Gestão de Motoboys</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <input type="password" name="senha" class="form-control" placeholder="••••••" required>
    </div>
    <button type="submit" class="btn-login">Entrar <i class="fas fa-arrow-right ms-1"></i></button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
