<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin — PainelGest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0d17;
      color: #e2e8f0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(245,158,11,0.15), transparent),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
      pointer-events: none;
    }
    .login-box {
      position: relative;
      background: #131720;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 44px 40px;
      width: 400px;
      max-width: 95vw;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 14px;
      display: inline-grid; place-items: center;
      font-size: 22px; color: #fff;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(245,158,11,0.25);
    }
    .login-logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .login-logo h1 span { color: #f59e0b; }
    .login-logo p { font-size: 12px; color: #64748b; margin-top: 4px; }
    .super-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      color: #fbbf24;
      font-size: 11px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px;
      margin-top: 8px;
    }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: #64748b; margin-bottom: 6px;
    }
    .input-wrap {
      position: relative; margin-bottom: 16px;
    }
    .input-wrap i {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: #475569; font-size: 13px;
    }
    input {
      width: 100%;
      background: #1c2133;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 10px 12px 10px 38px;
      color: #e2e8f0; font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #f59e0b; }
    .btn-super {
      width: 100%;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff; border: none;
      padding: 11px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s;
    }
    .btn-super:hover { opacity: 0.9; }
    .flash-msg {
      display: flex; align-items: center; gap: 8px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px;
    }
    .back-link {
      display: block; text-align: center;
      margin-top: 20px; font-size: 12px; color: #475569;
      text-decoration: none;
    }
    .back-link:hover { color: #64748b; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="login-logo-icon"><i class="fas fa-crown"></i></div>
    <h1>Painel<span>Gest</span></h1>
    <p>Acesso ao painel de controle</p>
    <div class="super-badge"><i class="fas fa-shield-halved"></i> Super Admin</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg"><i class="fas fa-circle-xmark"></i> {{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>Usuário</label>
      <div class="input-wrap">
        <i class="fas fa-user-shield"></i>
        <input type="text" name="username" placeholder="superadmin" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-super">
      <i class="fas fa-sign-in-alt"></i> Entrar no Super Admin
    </button>
  </form>

  <a href="{{ url_for('login') }}" class="back-link">← Voltar para o login do Gestor</a>
</div>
</body>
</html>
